# Phase 3: YOLOv8x on IDUN cluster
# Larger model + bigger batch size possible with A100 GPUs.
# Data path is set dynamically by the training script.

model: yolov8x.pt
# data: set by script (points to prepared yolo_dataset on IDUN)

# Training
epochs: 100
imgsz: 1280
batch: 8           # A100 40GB can handle batch=8 at 1280px with YOLOv8x
patience: 25

# Optimization — explicit AdamW so lr0 is respected
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 5
weight_decay: 0.0005

# Augmentation — same as local improved config
mosaic: 0.5
mixup: 0.0
copy_paste: 0.0
scale: 0.7
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
fliplr: 0.5
flipud: 0.0
close_mosaic: 15
