# Phase 3 Exp 5: YOLOv8x at 1920px resolution
# Higher resolution to improve tiny ball detection.
# Batch reduced to 4 due to memory constraints on A100 40GB.

model: yolov8x.pt
# data: set by script

# Training
epochs: 100
imgsz: 1920
batch: 4            # A100 40GB — 1920px requires smaller batch
patience: 25

# Optimization
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 5
weight_decay: 0.0005

# Augmentation — same as Exp 3
mosaic: 0.5
mixup: 0.0
copy_paste: 0.0
scale: 0.7
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
fliplr: 0.5
flipud: 0.0
close_mosaic: 15
